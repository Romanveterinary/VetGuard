<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Локальний Сканер | VetGuard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #camera-container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; box-sizing: border-box; pointer-events: none; }
        .header-bar { display: flex; justify-content: space-between; pointer-events: auto; width: 100%; }
        .back-btn { padding: 8px 12px; background: rgba(44, 62, 80, 0.7); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .status-badge { background: rgba(0,0,0,0.6); color: #2ecc71; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; }
        
        /* Тонкий компактний приціл */
        .crosshair { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; }
        .crosshair::before, .crosshair::after { content: ''; position: absolute; background: rgba(52, 152, 219, 0.8); box-shadow: 0 0 2px rgba(0,0,0,0.5); }
        .crosshair::before { top: 11px; left: 0; width: 24px; height: 2px; }
        .crosshair::after { top: 0; left: 11px; width: 2px; height: 24px; }

        /* Дуже компактна панель управління знизу, щоб не закривати огляд */
        .controls-area { display: flex; flex-direction: column; align-items: center; pointer-events: auto; margin-bottom: 15px; gap: 10px; width: 100%; }
        
        .result-badge { display: none; background: rgba(44, 62, 80, 0.9); color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 1.1rem; font-weight: bold; border: 1px solid #3498db; }
        .result-badge span { color: #3498db; font-size: 1.4rem; }
        
        /* Блок з двома повзунками */
        .sliders-box { display: none; background: rgba(0,0,0,0.75); padding: 10px 15px; border-radius: 12px; width: 90%; max-width: 320px; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.1); }
        .slider-row { margin-bottom: 8px; text-align: left; }
        .slider-row:last-child { margin-bottom: 0; }
        .slider-row label { display: flex; justify-content: space-between; color: #bdc3c7; font-size: 12px; font-weight: bold; margin-bottom: 30px; }
        .slider-row label span { color: #3498db; }
        .slider-row input[type=range] { width: 100%; accent-color: #3498db; margin: 0; }

        .capture-btn { background: #3498db; color: white; border: none; padding: 14px 30px; border-radius: 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 90%; max-width: 320px; }
    </style>
</head>
<body>
    
    <div id="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div class="crosshair" id="crosshair"></div>
        
        <div class="ui-layer">
            <div class="header-bar">
                <button class="back-btn" onclick="window.location.href='index.html'">← Меню</button>
                <div class="status-badge" id="status-text">Завантаження аналізатора...</div>
            </div>
            
            <div class="controls-area">
                <div class="result-badge" id="result-panel">Знайдено фігур: <span id="object-count">0</span></div>
                
                <div class="sliders-box" id="sliders-box">
                    <div class="slider-row">
                        <label>Точність розпізнавання: <span id="thresh-val">50</span>%</label>
                        <input type="range" id="thresh-slider" min="15" max="85" value="50">
                    </div>
                    <div class="slider-row">
                        <label>Калібрування відстані (коеф.): <span id="calib-val">150</span></label>
                        <input type="range" id="calib-slider" min="50" max="350" value="150">
                    </div>
                </div>
                
                <button class="capture-btn" id="btn-capture" style="display:none;">📸 Зафіксувати кадр</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="js/modules/ai-counter.js"></script>

</body>
</html>
