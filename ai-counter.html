<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ШІ-Лічильник PRO | VetGuard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        #camera-container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        /* Canvas тепер приймає кліки */
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: auto; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; pointer-events: none; }
        .header-bar { display: flex; justify-content: space-between; pointer-events: auto; }
        .back-btn { padding: 10px 15px; background: rgba(44, 62, 80, 0.8); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .status-badge { background: rgba(0,0,0,0.6); color: #f39c12; padding: 10px 15px; border-radius: 10px; font-size: 14px; font-weight: bold; }
        
        /* Приціл */
        .crosshair { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); pointer-events: none; z-index: 3; }
        .crosshair::before, .crosshair::after { content: ''; position: absolute; background: rgba(231, 76, 60, 0.9); box-shadow: 0 0 4px rgba(0,0,0,0.5); }
        .crosshair::before { top: 14px; left: 0; width: 30px; height: 2px; }
        .crosshair::after { top: 0; left: 14px; width: 2px; height: 30px; }
        .crosshair-center { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: white; border-radius: 50%; transform: translate(-50%, -50%); }

        .controls-area { display: flex; flex-direction: column; align-items: center; pointer-events: auto; margin-bottom: 30px; gap: 15px; width: 100%; }
        
        /* Плашка результатів */
        .result-panel { display: none; background: rgba(0,0,0,0.8); color: #fff; padding: 15px 20px; border-radius: 15px; text-align: center; font-size: 1.5rem; font-weight: bold; border: 2px solid #27ae60; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 90%; max-width: 300px; }
        .detected-name { font-size: 1rem; color: #bdc3c7; margin-bottom: 5px; text-transform: uppercase; }
        .result-panel span { color: #27ae60; font-size: 2.2rem; }
        
        .instruction-hint { display: none; background: rgba(231, 76, 60, 0.9); color: white; padding: 8px 15px; border-radius: 20px; font-size: 14px; text-align: center; pointer-events: none; margin-bottom: -5px; }

        .btn-group { display: flex; gap: 10px; width: 90%; max-width: 400px; justify-content: center; }
        .action-btn { color: white; border: none; padding: 15px 20px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); flex: 1; }
        #btn-capture { background: #2980b9; width: 90%; max-width: 400px;}
        #btn-retry { background: #7f8c8d; display: none; }
        #btn-confirm { background: #27ae60; display: none; }
    </style>
</head>
<body>
    
    <div id="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div class="crosshair" id="crosshair"><div class="crosshair-center"></div></div>
        
        <div class="ui-layer">
            <div class="header-bar">
                <button class="back-btn" onclick="window.location.href='index.html'">← Меню</button>
                <div class="status-badge" id="status-text">Завантаження ШІ...</div>
            </div>
            
            <div class="controls-area">
                <div class="instruction-hint" id="instruction-hint">👆 Тапай по екрану, щоб додати/видалити крапку</div>
                
                <div class="result-panel" id="result-panel">
                    <div class="detected-name" id="detected-name">Ціль: ...</div>
                    Кількість: <span id="object-count">0</span>
                </div>
                
                <button class="action-btn" id="btn-capture" style="display:none;">🎯 Фіксація</button>
                
                <div class="btn-group">
                    <button class="action-btn" id="btn-retry">Скасувати</button>
                    <button class="action-btn" id="btn-confirm">✅ Зберегти</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="js/modules/ai-counter.js"></script>

</body>
</html>
