<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ШІ-Лічильник | VetGuard Pro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #camera-container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; pointer-events: none; }
        .header-bar { display: flex; justify-content: space-between; pointer-events: auto; }
        .back-btn { padding: 10px 15px; background: rgba(44, 62, 80, 0.8); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); }
        .status-badge { background: rgba(0,0,0,0.6); color: white; padding: 10px 15px; border-radius: 10px; font-size: 14px; backdrop-filter: blur(5px); }
        
        /* Зона управління знизу */
        .controls-area { display: flex; flex-direction: column; align-items: center; pointer-events: auto; margin-bottom: 30px; gap: 15px; }
        
        /* Новий повзунок */
        .slider-panel { background: rgba(0,0,0,0.7); color: white; padding: 15px 20px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; backdrop-filter: blur(5px); transition: opacity 0.5s ease; opacity: 1; }
        .slider-panel.hidden { opacity: 0; pointer-events: none; }
        .slider-panel label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 14px; color: #bdc3c7; }
        .slider-panel input[type=range] { width: 100%; accent-color: var(--offline-accent); }
        
        .result-panel { display: none; background: rgba(0,0,0,0.8); color: #fff; padding: 15px; border-radius: 15px; font-size: 1.5rem; font-weight: bold; backdrop-filter: blur(5px); }
        .result-panel span { color: var(--offline-accent); font-size: 2.2rem; }
        
        .capture-btn { background: var(--offline-accent); color: white; border: none; padding: 18px 40px; border-radius: 30px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
    </style>
</head>
<body>
    
    <div id="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <div class="ui-layer">
            <div class="header-bar">
                <button class="back-btn" onclick="window.location.href='index.html'">← Меню</button>
                <div class="status-badge" id="status-text">Ініціалізація ШІ...</div>
            </div>
            
            <div class="controls-area">
                <div class="result-panel" id="result-panel">Знайдено: <span id="object-count">0</span></div>
                
                <div class="slider-panel" id="slider-panel">
                    <label for="threshold-slider">Чутливість ШІ: <span id="threshold-val">50</span>%</label>
                    <input type="range" id="threshold-slider" min="10" max="90" value="50">
                </div>
                
                <button class="capture-btn" id="btn-capture">📸 Захопити і Рахувати</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="js/modules/ai-counter.js"></script>

</body>
</html>
