<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ШІ-Лічильник | VetGuard Pro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #camera-container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; pointer-events: none; }
        .header-bar { display: flex; justify-content: space-between; pointer-events: auto; }
        .back-btn { padding: 10px 15px; background: rgba(44, 62, 80, 0.8); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .status-badge { background: rgba(0,0,0,0.6); color: #f39c12; padding: 10px 15px; border-radius: 10px; font-size: 14px; font-weight: bold; }
        
        /* Хрестик прицілу */
        .crosshair { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); pointer-events: none; z-index: 100; }
        .crosshair::before, .crosshair::after { content: ''; position: absolute; background: rgba(231, 76, 60, 0.9); box-shadow: 0 0 4px rgba(0,0,0,0.5); }
        .crosshair::before { top: 14px; left: 0; width: 30px; height: 2px; }
        .crosshair::after { top: 0; left: 14px; width: 2px; height: 30px; }
        .crosshair-center { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: white; border-radius: 50%; transform: translate(-50%, -50%); }

        .controls-area { display: flex; flex-direction: column; align-items: center; pointer-events: auto; margin-bottom: 30px; gap: 15px; width: 100%; }
        
        .result-panel { display: none; background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 15px; font-size: 1.5rem; font-weight: bold; border: 2px solid var(--cloud-accent); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .result-panel span { color: var(--cloud-accent); font-size: 2.2rem; }
        
        /* НОВИЙ ПОВЗУНОК */
        .slider-panel { display: none; background: rgba(0,0,0,0.8); color: white; padding: 15px 20px; border-radius: 15px; width: 90%; max-width: 300px; text-align: center; border: 1px solid var(--cloud-accent); }
        .slider-panel label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 14px; color: #bdc3c7; }
        .slider-panel input[type=range] { width: 100%; accent-color: var(--cloud-accent); }

        .capture-btn { background: var(--cloud-accent); color: white; border: none; padding: 18px 40px; border-radius: 30px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); width: 90%; max-width: 400px; }
    </style>
</head>
<body>
    
    <div id="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <div class="crosshair"><div class="crosshair-center"></div></div>
        
        <div class="ui-layer">
            <div class="header-bar">
                <button class="back-btn" onclick="window.location.href='index.html'">← Меню</button>
                <div class="status-badge" id="status-text">Наведіть приціл</div>
            </div>
            
            <div class="controls-area">
                <div class="result-panel" id="result-panel">Знайдено: <span id="object-count">0</span></div>
                
                <div class="slider-panel" id="slider-panel">
                    <label for="sensitivity-slider">Точність збігу: <span id="sensitivity-val">50</span>%</label>
                    <input type="range" id="sensitivity-slider" min="10" max="95" value="50">
                </div>

                <button class="capture-btn" id="btn-capture">🎯 Фіксація та Підрахунок</button>
            </div>
        </div>
    </div>

    <script src="js/modules/ai-counter.js"></script>

</body>
</html>
