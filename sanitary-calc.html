<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Санітарний Калькулятор | VetGuard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        #camera-container { position: relative; width: 100vw; height: 100dvh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; display: none; }
        
        .ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 10; display: flex; flex-direction: column; justify-content: space-between; 
            padding: 15px; padding-bottom: max(35px, env(safe-area-inset-bottom));
            box-sizing: border-box; pointer-events: none; 
        }
        
        .header-bar { display: flex; justify-content: space-between; pointer-events: auto; width: 100%; }
        .back-btn { padding: 8px 12px; background: rgba(44, 62, 80, 0.7); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .status-badge { background: rgba(0,0,0,0.6); color: #9b59b6; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; }
        
        .controls-area { display: flex; flex-direction: column; align-items: center; pointer-events: auto; gap: 10px; width: 100%; z-index: 15; max-height: 85vh; overflow-y: auto;}
        
        /* Блок поради ШІ */
        .ai-advice-panel { 
            display: none; background: rgba(0,0,0,0.85); color: #fff; 
            padding: 15px; border-radius: 15px; border: 1px solid #9b59b6; width: 90%; max-width: 400px;
        }
        .advice-title { color: #9b59b6; font-size: 16px; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px;}
        .chem-type { font-size: 18px; font-weight: bold; color: #2ecc71; margin: 5px 0; }
        .chem-reason { font-size: 13px; color: #bdc3c7; }

        /* Блок Калькулятора */
        .calc-panel {
            background: rgba(44, 62, 80, 0.95); padding: 15px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: none;
        }
        .input-group { margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .input-group label { color: white; font-size: 14px; font-weight: bold;}
        .input-group input { width: 80px; padding: 8px; border-radius: 6px; border: none; text-align: center; font-size: 16px; font-weight: bold;}
        
        .calc-result { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; margin-top: 15px; text-align: center;}
        .calc-result div { color: #bdc3c7; font-size: 14px; margin-bottom: 5px; }
        .calc-result span { color: #f1c40f; font-size: 20px; font-weight: bold; }

        .action-btn { background: #9b59b6; color: white; border: none; padding: 16px; border-radius: 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 90%; max-width: 400px; }
        .calc-btn { background: #2980b9; width: 100%; margin-top: 10px; }
        
        .btn-group { display: flex; gap: 10px; width: 90%; max-width: 400px; display: none; margin-top: 10px;}
        .btn-group button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; color: white; cursor: pointer;}
        #btn-retry { background: #7f8c8d; }
    </style>
</head>
<body>
    
    <div id="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <div class="ui-layer">
            <div class="header-bar">
                <button class="back-btn" onclick="window.location.href='index.html'">← Меню</button>
                <div class="status-badge" id="status-text">Сфотографуйте поверхню</div>
            </div>
            
            <div class="controls-area">
                
                <div class="ai-advice-panel" id="ai-advice-panel">
                    <div class="advice-title">🧪 Рекомендація ШІ-Технолога</div>
                    <div id="surface-type" style="font-size: 14px;">Поверхня: ...</div>
                    <div id="chem-type" class="chem-type">Визначаю...</div>
                    <div id="chem-reason" class="chem-reason">Аналізую забруднення...</div>
                </div>

                <div class="calc-panel" id="calc-panel">
                    <div class="input-group">
                        <label>Площа (м²):</label>
                        <input type="number" id="input-area" value="100" min="1">
                    </div>
                    <div class="input-group">
                        <label>Концентрація (%):</label>
                        <input type="number" id="input-conc" value="2" step="0.1" min="0.1">
                    </div>
                    <div class="input-group">
                        <label>Витрата (літрів на 1 м²):</label>
                        <input type="number" id="input-rate" value="0.5" step="0.1" min="0.1">
                    </div>
                    
                    <button class="action-btn calc-btn" id="btn-calculate">🧮 Розрахувати об'єм</button>
                    
                    <div class="calc-result" id="calc-result" style="display: none;">
                        <div>Потрібно РОБОЧОГО розчину: <br><span id="res-total">0</span> л</div>
                        <hr style="border-color: rgba(255,255,255,0.1); margin: 8px 0;">
                        <div>Взяти КОНЦЕНТРАТУ (хімії): <br><span id="res-chem" style="color:#e74c3c;">0</span> л</div>
                        <div>Додати ВОДИ: <br><span id="res-water" style="color:#3498db;">0</span> л</div>
                    </div>
                </div>
                
                <button class="action-btn" id="btn-capture">📸 Аналізувати поверхню</button>
                
                <div class="btn-group" id="btn-group">
                    <button id="btn-retry">Нове фото</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/modules/sanitary-calc.js"></script>

</body>
</html>
