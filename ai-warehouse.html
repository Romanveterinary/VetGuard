<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI-Аудитор Складів | VetGuard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        #camera-container { position: relative; width: 100vw; height: 100dvh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
        
        .ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 10; display: flex; flex-direction: column; justify-content: space-between; 
            padding: 15px; padding-bottom: max(35px, env(safe-area-inset-bottom));
            box-sizing: border-box; pointer-events: none; 
        }
        
        .header-bar { display: flex; justify-content: space-between; pointer-events: auto; width: 100%; z-index: 20;}
        .back-btn { padding: 8px 12px; background: rgba(44, 62, 80, 0.7); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .status-badge { background: rgba(0,0,0,0.6); color: #3498db; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; }
        
        /* Зникаючий блок керування */
        #interactive-controls {
            position: absolute; top: 70px; right: 15px; left: 15px; bottom: 100px;
            pointer-events: none; z-index: 15; transition: opacity 0.4s ease-in-out;
        }
        .hidden-controls { opacity: 0; }

        /* Випадаючий список */
        .warehouse-dropdown {
            position: absolute; top: 0; left: 0; width: 65%; max-width: 250px;
            background: rgba(0,0,0,0.8); color: #fff; border: 1px solid #3498db;
            padding: 12px; border-radius: 12px; font-size: 14px; font-weight: bold;
            pointer-events: auto; outline: none; appearance: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Вертикальний термометр */
        .thermometer-container {
            position: absolute; right: 0; top: 50px;
            display: flex; flex-direction: column; align-items: center;
            background: rgba(0,0,0,0.8); padding: 15px 10px; border-radius: 20px;
            pointer-events: auto; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .temp-display { color: #3498db; font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        .temp-label { color: #bdc3c7; font-size: 12px; margin: 5px 0; font-weight: bold;}
        
        .slider-wrapper { height: 180px; width: 30px; position: relative; display: flex; justify-content: center; align-items: center;}
        input[type=range].vertical-slider {
            -webkit-appearance: slider-vertical;
            width: 8px; height: 180px; margin: 0; padding: 0;
            accent-color: #3498db; cursor: grab;
        }

        .controls-area { display: flex; flex-direction: column; align-items: center; pointer-events: auto; gap: 10px; width: 100%; z-index: 20;}
        
        /* Панель результатів */
        .result-panel { 
            display: none; background: rgba(0,0,0,0.9); color: #fff; 
            padding: 15px; border-radius: 15px; text-align: left; 
            border: 1px solid #3498db; width: 90%; max-width: 400px;
            max-height: 60vh; overflow-y: auto; font-size: 14px; line-height: 1.4;
        }
        
        .section-title { font-size: 16px; font-weight: bold; margin: 15px 0 5px 0; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .sec-obj { color: #3498db; }
        .sec-san { color: #e74c3c; }
        .sec-saf { color: #f1c40f; }
        .sec-rec { color: #2ecc71; }
        .content-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 5px; }

        .capture-btn { background: #3498db; color: white; border: none; padding: 18px 30px; border-radius: 25px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 90%; max-width: 400px; }
        
        .btn-group { display: flex; gap: 10px; width: 90%; max-width: 400px; display: none; }
        .btn-group button { flex: 1; padding: 15px; border: none; border-radius: 15px; font-weight: bold; color: white; cursor: pointer;}
        #btn-retry { background: #7f8c8d; }
        #btn-save { background: #27ae60; }
    </style>
</head>
<body>
    
    <div id="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <div id="interactive-controls">
            <select id="warehouse-select" class="warehouse-dropdown">
                <option value="Камера заморозки">❄️ Камера заморозки</option>
                <option value="Камера охолодження">🧊 Камера охолодження</option>
                <option value="Камера зберігання готової продукції кулінарії">🍱 Зберігання готової кулінарії</option>
                <option value="Камера транспортування">🚚 Камера транспортування</option>
                <option value="Камера авто (буда)">🚐 Камера авто (буда)</option>
                <option value="Сухий склад">📦 Сухий склад</option>
            </select>

            <div class="thermometer-container" id="thermometer-ui">
                <div class="temp-display" id="temp-display">-18°C</div>
                <div class="temp-label">+25</div>
                <div class="slider-wrapper">
                    <input type="range" min="-35" max="25" value="-18" class="vertical-slider" id="temp-slider">
                </div>
                <div class="temp-label">-35</div>
            </div>
        </div>

        <div class="ui-layer">
            <div class="header-bar">
                <button class="back-btn" onclick="window.location.href='index.html'">← Меню</button>
                <div class="status-badge" id="status-text">Оберіть об'єкт і тапайте по екрану</div>
            </div>
            
            <div class="controls-area">
                <div class="result-panel" id="result-panel">
                    <div class="section-title sec-obj">👁️ 1. Об'єктивна картина</div>
                    <div class="content-box" id="res-objective">Аналіз...</div>

                    <div class="section-title sec-san">❌ 2. Санітарні Порушення</div>
                    <div class="content-box" id="res-sanitary" style="border-left: 3px solid #e74c3c;">Аналіз...</div>

                    <div class="section-title sec-saf">⚡ 3. Охорона праці та Тара</div>
                    <div class="content-box" id="res-safety" style="border-left: 3px solid #f1c40f;">Аналіз...</div>
                    
                    <div class="section-title sec-rec">💡 4. Рекомендації Логіста</div>
                    <div class="content-box" id="res-recommendations" style="border-left: 3px solid #2ecc71;">Аналіз...</div>
                </div>
                
                <button class="capture-btn" id="btn-capture">📸 Аналіз Складу</button>
                
                <div class="btn-group" id="btn-group">
                    <button id="btn-retry">Нове фото</button>
                    <button id="btn-save">Зберегти звіт</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/modules/ai-warehouse.js"></script>

</body>
</html>
