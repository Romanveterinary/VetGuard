<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI-Аудитор Вітрин | VetGuard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        #camera-container { position: relative; width: 100vw; height: 100dvh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
        
        .ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 10; display: flex; flex-direction: column; justify-content: space-between; 
            padding: 15px; padding-bottom: max(35px, env(safe-area-inset-bottom));
            box-sizing: border-box; pointer-events: none; 
        }
        
        .header-bar { display: flex; justify-content: space-between; pointer-events: auto; width: 100%; }
        .back-btn { padding: 8px 12px; background: rgba(44, 62, 80, 0.7); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .status-badge { background: rgba(0,0,0,0.6); color: #f39c12; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; }
        
        .controls-area { display: flex; flex-direction: column; align-items: center; pointer-events: auto; gap: 10px; width: 100%; z-index: 15;}
        
        .result-panel { 
            display: none; background: rgba(0,0,0,0.9); color: #fff; 
            padding: 15px; border-radius: 15px; text-align: left; 
            border: 1px solid #f39c12; width: 90%; max-width: 400px;
            max-height: 55vh; overflow-y: auto; font-size: 14px; line-height: 1.4;
        }
        
        .verdict { padding: 10px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 10px; font-size: 16px; }
        .verdict.ok { background: rgba(46, 204, 113, 0.3); border: 1px solid #2ecc71; color: #2ecc71; }
        .verdict.warn { background: rgba(231, 76, 60, 0.3); border: 1px solid #e74c3c; color: #e74c3c; }
        
        .section-title { font-size: 15px; font-weight: bold; margin: 10px 0 5px 0; color: #f39c12; }
        .content-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 5px; }

        /* Блок з двома кнопками: Фото і Галерея */
        .action-buttons-group { display: flex; gap: 10px; width: 90%; max-width: 400px; }
        .capture-btn { flex: 2; background: #e67e22; color: white; border: none; padding: 18px; border-radius: 20px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .gallery-btn { flex: 1; background: #34495e; color: white; border: none; padding: 18px; border-radius: 20px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .btn-group { display: flex; gap: 10px; width: 90%; max-width: 400px; display: none; }
        .btn-group button { flex: 1; padding: 15px; border: none; border-radius: 15px; font-weight: bold; color: white; cursor: pointer;}
        #btn-retry { background: #7f8c8d; }
        #btn-save { background: #27ae60; }
    </style>
</head>
<body>
    
    <div id="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <div class="ui-layer">
            <div class="header-bar">
                <button class="back-btn" onclick="window.location.href='index.html'">← Меню</button>
                <div class="status-badge" id="status-text">Охопіть вітрину цілком</div>
            </div>
            
            <div class="controls-area">
                <div class="result-panel" id="result-panel">
                    <div id="verdict-box" class="verdict">Аналіз...</div>
                    
                    <div class="section-title">⚖️ Санітарна експертиза:</div>
                    <div class="content-box" id="sanitary-text">...</div>
                    
                    <div class="section-title">💡 Поради топ-мерчандайзера:</div>
                    <div class="content-box" id="marketing-text">...</div>
                </div>
                
                <input type="file" id="gallery-input" accept="image/*" style="display: none;">
                
                <div class="action-buttons-group" id="action-buttons-group">
                    <button class="capture-btn" id="btn-capture">📸 Фото</button>
                    <button class="gallery-btn" id="btn-gallery">🖼️ Галерея</button>
                </div>
                
                <div class="btn-group" id="btn-group">
                    <button id="btn-retry">Новий аналіз</button>
                    <button id="btn-save">Зберегти звіт</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/modules/ai-auditor.js"></script>

</body>
</html>
