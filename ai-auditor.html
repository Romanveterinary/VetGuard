<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI-Аудитор Вітрин | VetGuard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        #camera-container { position: relative; width: 100vw; height: 100dvh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
        
        .ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 10; display: flex; flex-direction: column; justify-content: space-between; 
            padding: 15px; padding-bottom: max(35px, env(safe-area-inset-bottom));
            box-sizing: border-box; pointer-events: none; 
        }
        
        .header-bar { display: flex; justify-content: space-between; pointer-events: auto; width: 100%; }
        .back-btn { padding: 8px 12px; background: rgba(44, 62, 80, 0.7); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .status-badge { background: rgba(0,0,0,0.6); color: #f39c12; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; }
        
        .controls-area { display: flex; flex-direction: column; align-items: center; pointer-events: auto; gap: 10px; width: 100%; z-index: 15;}
        
        /* Панель результатів: 2 блоки */
        .result-panel { 
            display: none; background: rgba(0,0,0,0.9); color: #fff; 
            padding: 15px; border-radius: 15px; text-align: left; 
            border: 1px solid #f39c12; width: 90%; max-width: 400px;
            max-height: 60vh; overflow-y: auto; font-size: 14px; line-height: 1.4;
        }
        
        .section-title { font-size: 16px; font-weight: bold; margin: 10px 0 5px 0; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .sanitary-title { color: #e74c3c; }
        .marketing-title { color: #f1c40f; }

        .verdict { font-size: 16px; font-weight: bold; text-align: center; margin-bottom: 10px; padding: 8px; border-radius: 8px;}
        .verdict.ok { background: rgba(39, 174, 96, 0.3); color: #2ecc71; border: 1px solid #2ecc71; }
        .verdict.warn { background: rgba(231, 76, 60, 0.3); color: #e74c3c; border: 1px solid #e74c3c; }

        .content-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .marketing-box { border-left: 3px solid #f1c40f; }

        .capture-btn { background: #f39c12; color: white; border: none; padding: 18px 30px; border-radius: 25px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 90%; max-width: 400px; }
        
        .btn-group { display: flex; gap: 10px; width: 90%; max-width: 400px; display: none; }
        .btn-group button { flex: 1; padding: 15px; border: none; border-radius: 15px; font-weight: bold; color: white; cursor: pointer;}
        #btn-retry { background: #7f8c8d; }
        #btn-save { background: #27ae60; }
    </style>
</head>
<body>
    
    <div id="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <div class="ui-layer">
            <div class="header-bar">
                <button class="back-btn" onclick="window.location.href='index.html'">← Меню</button>
                <div class="status-badge" id="status-text">Охопіть вітрину цілком</div>
            </div>
            
            <div class="controls-area">
                <div class="result-panel" id="result-panel">
                    
                    <div class="section-title sanitary-title">🔴 1. Санітарний Контроль</div>
                    <div id="verdict-box" class="verdict ok">✅ Порушень не виявлено</div>
                    <div class="content-box" id="sanitary-text">Аналіз законів...</div>

                    <div class="section-title marketing-title">💡 2. Мерчандайзинг (Як продати більше)</div>
                    <div class="content-box marketing-box" id="marketing-text">Аналіз розкладки...</div>

                </div>
                
                <button class="capture-btn" id="btn-capture">📸 Аудит Вітрини</button>
                
                <div class="btn-group" id="btn-group">
                    <button id="btn-retry">Нове фото</button>
                    <button id="btn-save">Зберегти звіт</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/modules/ai-auditor.js"></script>

</body>
</html>
