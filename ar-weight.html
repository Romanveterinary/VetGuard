<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR-Вага тварин | VetGuard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; touch-action: none; }
        
        #camera-container { position: relative; width: 100vw; height: 100dvh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        
        /* Шар для збереженого фото */
        #photo-canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 2; display: none; }
        
        /* Шар для малювання ліній пальцем */
        #draw-canvas { position: absolute; width: 100%; height: 100%; z-index: 3; display: none; cursor: crosshair; }
        
        .ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 10; display: flex; flex-direction: column; justify-content: space-between; 
            padding: 15px; padding-bottom: max(35px, env(safe-area-inset-bottom));
            box-sizing: border-box; pointer-events: none; 
        }
        
        .header-bar { display: flex; justify-content: space-between; pointer-events: auto; width: 100%; }
        .back-btn { padding: 8px 12px; background: rgba(44, 62, 80, 0.7); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .status-badge { background: rgba(0,0,0,0.6); color: #2ecc71; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; }
        
        .controls-area { display: flex; flex-direction: column; align-items: center; pointer-events: auto; gap: 10px; width: 100%; }
        
        /* Панель введення даних */
        .calc-panel {
            display: none; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 15px; 
            border: 1px solid #2ecc71; width: 90%; max-width: 400px;
            box-sizing: border-box;
        }
        
        select.animal-select {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: rgba(255,255,255,0.1); color: white; font-size: 16px; margin-bottom: 10px; outline: none;
            box-sizing: border-box;
        }

        /* ВИПРАВЛЕНИЙ БЛОК ІНПУТІВ */
        .input-group { 
            display: flex; 
            flex-direction: row; 
            gap: 10px; 
            margin-bottom: 10px; 
            width: 100%;
        }
        .input-group input { 
            flex: 1 1 0%; /* Жорстко ділить простір 50/50 */
            min-width: 0; /* Забороняє полю вилазити за межі через текст */
            width: 100%;
            box-sizing: border-box;
            padding: 12px 5px; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.2); /* Додана рамка для видимості */
            background: rgba(255,255,255,0.1); 
            color: white; 
            font-size: 16px; 
            text-align: center;
        }
        .input-group input::placeholder { color: #bdc3c7; font-size: 14px; }
        /* ------------------------- */

        .result-box { 
            background: rgba(46, 204, 113, 0.2); border: 1px solid #2ecc71; 
            padding: 15px; border-radius: 8px; text-align: center; display: none;
        }
        .weight-value { font-size: 32px; font-weight: bold; color: #2ecc71; margin: 5px 0; }
        .sub-text { font-size: 12px; color: #bdc3c7; }

        .btn-main { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; }
        .capture-btn { background: #e67e22; color: white; border: none; border-radius: 25px; padding: 18px 30px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 90%; max-width: 400px; }
        
        .btn-row { display: flex; gap: 10px; width: 100%; margin-top: 10px; }
        .btn-row button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; }
        #btn-retry { background: #7f8c8d; }
        #btn-save { background: #3498db; }
    </style>
</head>
<body>
    
    <div id="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="photo-canvas"></canvas>
        <canvas id="draw-canvas"></canvas>

        <div class="ui-layer">
            <div class="header-bar">
                <button class="back-btn" onclick="window.location.href='index.html'">← Меню</button>
                <div class="status-badge" id="status-text">Наведіть на тварину (збоку)</div>
            </div>
            
            <div class="controls-area">
                <div class="calc-panel" id="calc-panel">
                    <select id="animal-type" class="animal-select">
                        <option value="pig-avg">Свиня (середня вгодованість)</option>
                        <option value="pig-fat">Свиня (жирна)</option>
                        <option value="cow-dairy">ВРХ (молочна порода)</option>
                        <option value="cow-beef">ВРХ (м'ясна порода)</option>
                    </select>
                    
                    <div class="input-group">
                        <input type="number" id="input-length" placeholder="Довжина (см)">
                        <input type="number" id="input-girth" placeholder="Обхват (см)">
                    </div>
                    
                    <button id="btn-calculate" class="btn-main">🧮 Розрахувати вагу</button>
                    
                    <div class="result-box" id="result-box">
                        <div>Орієнтовна жива вага:</div>
                        <div class="weight-value" id="weight-display">-- кг</div>
                        <div class="sub-text">Можете намалювати лінії замірів на екрані</div>
                        
                        <div class="btn-row">
                            <button id="btn-retry">Скасувати</button>
                            <button id="btn-save">Зберегти фото</button>
                        </div>
                    </div>
                </div>
                
                <button class="capture-btn" id="btn-capture">📸 Зафіксувати кадр</button>
            </div>
        </div>
    </div>

    <script src="js/modules/ar-weight.js"></script>
</body>
</html>
