<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR-Рулетка | VetGuard Pro</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        
        #ar-ui { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; 
        }

        /* ХРЕСТИК ПО ЦЕНТРУ ЕКРАНА */
        .crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 20px; height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
        }
        .crosshair::before, .crosshair::after {
            content: ''; position: absolute; background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        .crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; } /* Горизонталь */
        .crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; } /* Вертикаль */

        .header-bar { 
            display: flex; justify-content: space-between; 
            padding: 20px; pointer-events: auto; 
        }

        .back-btn { 
            padding: 10px 15px; background: rgba(44, 62, 80, 0.8); 
            color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; 
        }

        .instructions { 
            color: white; background: rgba(0,0,0,0.6); 
            padding: 10px 15px; border-radius: 10px; font-size: 14px; max-width: 60%; text-align: right;
        }

        /* ПАНЕЛЬ З ЦИФРАМИ ТЕПЕР ЗГОРУ (ПІД КНОПКАМИ) */
        .measurement-panel { 
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #27ae60; 
            padding: 15px 30px; border-radius: 15px; text-align: center; 
            font-size: 28px; font-weight: bold; pointer-events: auto;
            border: 2px solid #27ae60; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 80%; max-width: 300px;
        }

        .area-text { font-size: 14px; color: #bdc3c7; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="ar-ui">
        <div class="header-bar">
            <button class="back-btn" onclick="window.location.href='index.html'">← Меню</button>
            <div class="instructions" id="instruction-text">Наведіть камеру. Кружечок = Площина</div>
        </div>
        
        <div class="measurement-panel">
            <span id="distance-value">0.00</span> м
            <span class="area-text">Відстань між останніми точками</span>
        </div>

        <div class="crosshair"></div>
    </div>
    <script type="module" src="js/modules/ar-ruler.js"></script>
</body>
</html>
