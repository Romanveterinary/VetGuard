<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR-Рулетка PRO | VetGuard</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        
        /* ВАЖЛИВО: Цей блок буде поверх AR-камери */
        #ar-ui { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; 
        }

        .crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 100;
        }
        .crosshair::before, .crosshair::after {
            content: ''; position: absolute; background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        .crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; } 
        .crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; } 

        .header-bar { display: flex; justify-content: space-between; padding: 20px; pointer-events: auto; }
        .back-btn { padding: 10px 15px; background: rgba(44, 62, 80, 0.8); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .instructions { color: white; background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 10px; font-size: 14px; text-align: right; }

        /* Панель з результатами і кнопками */
        .measurement-panel { 
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: white; 
            padding: 15px 20px; border-radius: 15px; text-align: center; 
            font-size: 20px; font-weight: bold; pointer-events: auto;
            border: 2px solid #27ae60; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 85%; max-width: 320px;
        }

        .dist-text { color: #f39c12; font-size: 26px; }
        .area-text { color: #3498db; font-size: 26px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        .action-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        #btn-close-shape { background-color: #3498db; display: none; }
        #btn-clear { background-color: #e74c3c; display: none; }
    </style>
</head>
<body>
    <div id="ar-ui">
        <div class="header-bar">
            <button class="back-btn" onclick="window.location.href='index.html'">← Меню</button>
            <div class="instructions" id="instruction-text">Шукаю площину...</div>
        </div>
        
        <div class="measurement-panel">
            <div>Відстань: <span id="distance-value" class="dist-text">0.00</span> м</div>
            <div id="area-container" style="display: none; margin-top: 5px;">Площа: <span id="area-value" class="area-text">0.00</span> м²</div>
            
            <div class="btn-group">
                <button class="action-btn" id="btn-close-shape">Замкнути фігуру</button>
                <button class="action-btn" id="btn-clear">Очистити</button>
            </div>
        </div>

        <div class="crosshair"></div>
    </div>
    <script type="module" src="js/modules/ar-ruler.js"></script>
</body>
</html>
