<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR-Рулетка | VetGuard Pro</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <style>
        /* Специфічні стилі тільки для екрана камери */
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #111; /* Темний фон, поки вантажиться камера */
        }
        
        #ar-ui { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            pointer-events: none; /* Щоб тапи проходили крізь UI до AR-сцени */
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 20px; 
            box-sizing: border-box; 
        }

        .header-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            pointer-events: auto; /* Дозволяємо натискати кнопки вгорі */
        }

        .back-btn { 
            padding: 12px 20px; 
            background: rgba(44, 62, 80, 0.8); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px;
            font-weight: bold; 
            cursor: pointer; 
            backdrop-filter: blur(5px); 
        }

        .instructions { 
            color: white; 
            text-align: right; 
            background: rgba(0,0,0,0.6); 
            padding: 10px 15px; 
            border-radius: 10px; 
            font-size: 14px;
            max-width: 60%;
        }

        /* Панель із результатами вимірювання внизу екрана */
        .measurement-panel { 
            background: rgba(0,0,0,0.8); 
            color: #27ae60; /* Наш фірмовий офлайн-зелений */
            padding: 20px; 
            border-radius: 15px; 
            text-align: center; 
            font-size: 28px; 
            font-weight: bold; 
            backdrop-filter: blur(5px); 
            margin-bottom: 80px; /* Відступ знизу для кнопки WebXR "Stop AR" */
            pointer-events: auto;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
        }

        .area-text {
            font-size: 18px; 
            color: #bdc3c7;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    
    <div id="ar-ui">
        <div class="header-bar">
            <button class="back-btn" onclick="window.location.href='index.html'">← Меню</button>
            <div class="instructions" id="instruction-text">Наведіть камеру на підлогу та поводіть телефоном для сканування</div>
        </div>
        
        <div class="measurement-panel">
            Відстань: <span id="distance-value">0.00</span> м
            <span class="area-text" id="area-value">Площа: 0.00 кв.м</span>
        </div>
    </div>

    <script type="module" src="js/modules/ar-ruler.js"></script>

</body>
</html>
